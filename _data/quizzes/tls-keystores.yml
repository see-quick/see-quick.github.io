# Quiz questions for: TLS, Keystores, and Truststores
# Used by: {% include quiz.html id="<id>" %}
# Post front matter must set: quiz: tls-keystores

- id: q1
  header: "Quick Check"
  question: "During the TLS handshake, what does the client use to verify the server's certificate?"
  options:
    - text: "The server's private key"
      correct: false
    - text: "Its own keystore"
      correct: false
    - text: "Its truststore (containing CA certificates)"
      correct: true
    - text: "The DNS record of the server"
      correct: false
  success: "The client checks the server's certificate against the CA certificates stored in its truststore. If the chain of trust leads back to a trusted CA, the connection proceeds."
  fail: "Not quite! Remember: the truststore contains CA certificates that the client uses to verify who it is talking to. The keystore is for your own identity, not for verification."

- id: q2
  header: "Pop Quiz"
  question: "Your Kafka broker needs to prove its identity to connecting clients. Which file do you configure on the broker?"
  options:
    - text: "A truststore containing the client's certificate"
      correct: false
    - text: "A keystore containing the broker's private key and certificate"
      correct: true
    - text: "A truststore containing the broker's own CA"
      correct: false
    - text: "Just the PEM file, keystores are optional"
      correct: false
  success: "The keystore holds the broker's private key and certificate, which is what it uses to prove its identity. Think of it as the broker's passport."
  fail: "Remember the analogy: keystore = your passport (proves who YOU are). The broker needs its own keystore to present its identity to clients."

- id: q3
  header: "Think About It"
  question: "In a mutual TLS (mTLS) setup, how many total files (keystores + truststores) do you need at minimum?"
  options:
    - text: "2 — one keystore and one truststore"
      correct: false
    - text: "3 — two keystores and one shared truststore"
      correct: false
    - text: "4 — each side needs its own keystore AND truststore"
      correct: true
    - text: "1 — just a single PKCS12 bundle with everything"
      correct: false
  success: "Each side needs a keystore (to prove their identity) and a truststore (to verify the other side). That is 4 files total: server keystore, server truststore, client keystore, client truststore."
  fail: "In mTLS, both sides prove identity AND verify the other. Each side needs: (1) a keystore for its own identity, (2) a truststore to verify the other side. That makes 4 files."

- id: q4
  header: "Debugging Challenge"
  question: "Your Java app throws <code>PKIX path building failed</code> when connecting to a server. What is the most likely cause?"
  options:
    - text: "Your keystore password is wrong"
      correct: false
    - text: "The server's private key has expired"
      correct: false
    - text: "Your truststore does not contain the CA that signed the server's certificate"
      correct: true
    - text: "You are using JKS instead of PKCS12"
      correct: false
  success: "PKIX path building failed means Java could not build a trust chain from the server's certificate to any CA in your truststore. Import the correct CA certificate and you are good to go."
  fail: "PKIX path building failed is specifically about trust verification. It means: 'I received a certificate but I do not trust whoever signed it.' The fix is always about the truststore."

- id: q5
  header: "Final Boss"
  question: "You are setting up mTLS for Kafka. You have created the server keystore, client keystore, and both truststores. The client connects but gets <code>certificate_unknown</code>. What did you forget?"
  options:
    - text: "To set <code>ssl.endpoint.identification.algorithm</code>"
      correct: false
    - text: "To convert from JKS to PKCS12"
      correct: false
    - text: "To import the CA certificate into the server's truststore so it can verify the client"
      correct: true
    - text: "To restart the Kafka broker after changing the config"
      correct: false
  success: "In mTLS the server also verifies clients. If the server's truststore does not contain the CA that signed the client's certificate, it will reject the client with certificate_unknown."
  fail: "The error certificate_unknown means the server received the client's certificate but does not trust it. The server's truststore needs the CA that signed the client certificate."