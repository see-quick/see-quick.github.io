<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 1.8rem; margin-bottom: 8px; color: #f0f6fc; }
    .meta { color: #8b949e; margin-bottom: 24px; font-size: 0.9rem; }
    .regression-banner { background: #3d1f1f; border: 1px solid #f85149; border-radius: 8px; padding: 16px; margin-bottom: 24px; }
    .regression-banner h2 { color: #f85149; font-size: 1.1rem; margin-bottom: 12px; }
    .regression-item { background: #161b22; border-radius: 6px; padding: 12px; margin-bottom: 8px; }
    .regression-item .metric-name { color: #f0f6fc; font-weight: 600; }
    .regression-item .details { color: #8b949e; font-size: 0.85rem; margin-top: 4px; }
    .no-regressions { background: #1a2e1a; border: 1px solid #3fb950; border-radius: 8px; padding: 16px; margin-bottom: 24px; color: #3fb950; }
    .filters { margin-bottom: 24px; display: flex; gap: 8px; flex-wrap: wrap; }
    .filters button { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    .filters button.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
    .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .chart-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
    .chart-card h3 { font-size: 0.95rem; margin-bottom: 12px; color: #f0f6fc; }
    canvas { width: 100% !important; }
    @media (max-width: 768px) { .chart-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    {{ content }}
  </div>
</body>
</html>
