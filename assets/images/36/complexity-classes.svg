<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750">
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; }
    .label { font-weight: bold; font-size: 20px; }
    .example { font-size: 18px; fill: #555; }
    .class-label { font-weight: bold; font-size: 22px; }
    .ring { stroke-width: 2.5; fill-opacity: 0.06; }
  </style>

  <!-- DECIDABLE (outermost) -->
  <ellipse cx="420" cy="350" rx="400" ry="330" class="ring" fill="#9E9E9E" stroke="#757575"/>
  <text x="420" y="40" text-anchor="middle" class="class-label" fill="#616161">DECIDABLE</text>

  <!-- EXPTIME -->
  <ellipse cx="420" cy="355" rx="330" ry="265" class="ring" fill="#7E57C2" stroke="#5E35B1"/>
  <text x="420" y="110" text-anchor="middle" class="class-label" fill="#5E35B1">EXPTIME</text>

  <!-- PSPACE -->
  <ellipse cx="420" cy="360" rx="260" ry="200" class="ring" fill="#42A5F5" stroke="#1E88E5"/>
  <text x="420" y="180" text-anchor="middle" class="class-label" fill="#1565C0">PSPACE</text>

  <!-- NP -->
  <ellipse cx="420" cy="365" rx="190" ry="140" class="ring" fill="#66BB6A" stroke="#43A047"/>
  <text x="420" y="248" text-anchor="middle" class="class-label" fill="#2E7D32">NP</text>

  <!-- P (innermost) -->
  <ellipse cx="420" cy="368" rx="120" ry="90" class="ring" fill="#FFA726" stroke="#FB8C00"/>
  <text x="420" y="340" text-anchor="middle" class="class-label" fill="#E65100">P</text>

  <!-- P examples -->
  <text x="420" y="365" text-anchor="middle" class="example">sorting · shortest path</text>
  <text x="420" y="385" text-anchor="middle" class="example">regex · primality</text>

  <!-- NP examples (between NP and P rings) -->
  <text x="420" y="478" text-anchor="middle" class="example">knapsack · SAT · TSP</text>
  <text x="420" y="498" text-anchor="middle" class="example">graph coloring</text>

  <!-- PSPACE examples (between PSPACE and NP rings) -->
  <text x="420" y="542" text-anchor="middle" class="example">QBF · generalized Go</text>

  <!-- EXPTIME examples (between EXPTIME and PSPACE rings) -->
  <text x="420" y="596" text-anchor="middle" class="example">generalized chess · checkers</text>

  <!-- Right-side annotations — lines start from right edge of each ring -->
  <!-- P: ellipse cx=420 rx=120, right edge ≈ 540 -->
  <line x1="540" y1="368" x2="830" y2="230" stroke="#E65100" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="838" y="225" class="label" fill="#E65100">P</text>
  <text x="838" y="250" class="example">O(n^k) — tractable</text>

  <!-- NP: ellipse cx=420 rx=190, right edge ≈ 610 -->
  <line x1="610" y1="365" x2="830" y2="330" stroke="#2E7D32" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="838" y="325" class="label" fill="#2E7D32">NP</text>
  <text x="838" y="350" class="example">verifiable in O(n^k)</text>

  <!-- PSPACE: ellipse cx=420 rx=260, right edge ≈ 680 -->
  <line x1="680" y1="360" x2="830" y2="430" stroke="#1565C0" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="838" y="425" class="label" fill="#1565C0">PSPACE</text>
  <text x="838" y="450" class="example">polynomial memory</text>

  <!-- EXPTIME: ellipse cx=420 rx=330, right edge ≈ 750 -->
  <line x1="750" y1="355" x2="830" y2="530" stroke="#5E35B1" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="838" y="525" class="label" fill="#5E35B1">EXPTIME</text>
  <text x="838" y="550" class="example">O(2^n^k) steps</text>

  <!-- Bottom note -->
  <text x="420" y="720" text-anchor="middle" font-size="22" fill="#888" font-style="italic">
    P ≠ EXPTIME (proven) · P = NP? ($1M open question)
  </text>
</svg>